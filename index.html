<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects</title>

  <style>
    :root {
      --bg: #0a0a0a;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-strong: rgba(255, 255, 255, 0.15);
      --border: rgba(255, 255, 255, 0.15);
      --accent: #00ff9d;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.65);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --blur: blur(20px);
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      background-image: 
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)),
        
        url('https://images.unsplash.com/photo-1603366615917-1fa6dad5c4fa?q=80&w=1470&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
      /*All credits go to the artist of the photo provided by this link*/
        background-size: cover;
      background-position: center;
      background-attachment: fixed;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Navbar */
    .topnav {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 1280px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      border-radius: 9999px;
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow);
      z-index: 1000;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: white;
      font-weight: 700;
      font-size: 1.4rem;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
      position: relative;
    }

    .nav-links a:after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background: var(--accent);
      transition: var(--transition);
    }

    .nav-links a:hover:after {
      width: 100%;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    /* Search */
    .search-form {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-form input {
      width: 260px;
      padding: 12px 20px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: white;
      font-size: 1rem;
      transition: var(--transition);
    }

    .search-form input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(0, 255, 157, 0.15);
      background: rgba(255,255,255,0.1);
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 20px 80px;
      text-align: center;
    }

    .hero-card {
      max-width: 820px;
      padding: 80px 60px;
      border-radius: 32px;
      background: var(--glass-strong);
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow);
      transition: var(--transition);
    }

    .hero-card:hover {
      transform: translateY(-12px);
    }

    .hero h1 {
      font-size: 4.2rem;
      font-weight: 700;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 1.35rem;
      color: var(--muted);
      max-width: 620px;
      margin: 0 auto 40px;
    }

    .btn {
      display: inline-block;
      padding: 16px 36px;
      background: transparent;
      color: white;
      border: 2px solid var(--accent);
      border-radius: 9999px;
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition);
      font-size: 1.1rem;
    }

    .btn:hover {
      background: var(--accent);
      color: #000;
      transform: scale(1.05);
    }

    /* Projects Grid */
    .projects {
      padding: 100px 20px;
      max-width: 1280px;
      margin: 0 auto;
    }

    .section-title {
      text-align: center;
      font-size: 2.8rem;
      margin-bottom: 60px;
      color: white;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 28px;
    }

    .project-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      transition: var(--transition);
      height: 100%;
    }

    .project-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 20px 40px rgba(0, 255, 157, 0.15);
    }

    .project-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .project-info {
      padding: 28px;
    }

    .project-info h3 {
      font-size: 1.5rem;
      margin-bottom: 12px;
    }

    .project-info p {
      color: var(--muted);
      margin-bottom: 20px;
      font-size: 1.05rem;
    }

    .tech-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tech {
      background: rgba(0, 255, 157, 0.1);
      color: var(--accent);
      padding: 4px 14px;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .project-links {
      display: flex;
      gap: 12px;
    }

    .project-links a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
    }

    /* About */
    .about-section {
      padding: 120px 20px;
      background: rgba(10,10,10,0.95);
    }

    .about-content {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }

    .about-content h2 {
      font-size: 2.8rem;
      margin-bottom: 32px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 60px 20px 40px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 3rem;
      }
      .topnav {
        flex-direction: column;
        height: auto;
        padding: 18px 24px;
        gap: 16px;
      }
      .hero-card {
        padding: 50px 30px;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="topnav">
    <div class="nav-left">
      <a href="index.html" class="logo">
        <span>Home</span>
        <span class="logo-dot"></span>
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="content.html">Projects</a>
        <a href="about.html">About</a>
      </div>
    </div>

    <div class="nav-right">
      <form class="search-form" onsubmit="executeSearch(event)">
        <input type="search" id="searchInput" placeholder="Search projects..." aria-label="Search">
      </form>
      <a href="https://github.com/madhusudhan-rgb" target="_blank" class="btn" style="padding: 10px 24px; font-size: 1rem;">GitHub</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-card">
      <h1 style = "font-size: large;">Hi, I'm Madhusudhan</h1>
      <p>Coder &amp; Just doing this for fun and on my free time</p>
      <a href="content.html" class="btn">View My Projects</a>
    </div>
  </section>

  <footer>
    © 2026 • Built as a GitHub Pages Portfolio • All images are placeholder
  </footer>

  <script>
    function executeSearch(event) {
      event.preventDefault();
      const query = document.getElementById("searchInput").value.trim().toLowerCase();
      
      if (query.includes("project") || query.includes("work")) {
        window.location.href = "content.html";
      } else if (query.includes("about") || query.includes("me")) {
        window.location.href = "about.html";
      } else {
        window.location.href = "content.html";
      }
    }
  </script>
</body>
</html>
